services:
  - type: web
    name: sabbar-server
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sabbar-db
          property: connectionString
      - key: CLIENT_ORIGIN
        value: https://sabbar-client.onrender.com

  - type: web
    name: sabbar-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sabbar-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sabbar-db
    databaseName: sabbar
    user: sabbar_user
